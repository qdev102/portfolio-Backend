spring.application.name=demo
# Railway s? t? ??ng c?p Port t?nh, n?u ch?y local thņ d∙ng 8080
server.port=${PORT:8080}

# ==========================================
# 1. DATABASE (AIVEN)
# ==========================================
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?ssl-mode=REQUIRED
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# C?u hņnh JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
# T?t log SQL ?? server ch?y nhanh h?n khi lĻn m?ng
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# 2. CLOUDINARY
# ==========================================
cloudinary.cloud-name=${CLOUDINARY_NAME}
cloudinary.api-key=${CLOUDINARY_KEY}
cloudinary.api-secret=${CLOUDINARY_SECRET}

# Gi?i h?n dung l??ng t?i lĻn
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=105MB

# ==========================================
# 3. B?O M?T JWT
# ==========================================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000 

# ==========================================
# 4. GMAIL SMTP
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Email nh?n th¶ng bßo
admin.email=${ADMIN_EMAIL}